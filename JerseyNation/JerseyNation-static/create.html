<main role="main" class="pb-3">

<div class="section-card">
  <h1>Create Jersey</h1>
  <form id="createForm" class="row g-3">
    <div class="col-md-6"><label class="form-label">Performed By</label><input name="performedBy" class="form-control" value="Admin User" /></div>
    <div class="col-md-6"><label class="form-label">Team</label><input name="team" class="form-control" /></div>
    <div class="col-md-6"><label class="form-label">Name</label><input name="name" class="form-control" /></div>
    <div class="col-md-6"><label class="form-label">Jersey Type</label><input name="jerseyType" class="form-control" /></div>
    <div class="col-md-4"><label class="form-label">Audience</label><input name="audience" class="form-control" /></div>
    <div class="col-md-4"><label class="form-label">Color</label><input name="color" class="form-control" /></div>
    <div class="col-md-4"><label class="form-label">Jersey Number</label><input name="jerseyNumber" class="form-control" type="number" /></div>
    <div class="col-md-4"><label class="form-label">Cost Price</label><input name="costPrice" class="form-control" type="number" step="0.01" /></div>
    <div class="col-md-4"><label class="form-label">Sale Price</label><input name="salePrice" class="form-control" type="number" step="0.01" /></div>
    <div class="col-md-4"><label class="form-label">Promo Price</label><input name="promoPrice" class="form-control" type="number" step="0.01" /></div>
    <div class="col-md-6"><label class="form-label">Available Sizes (comma separated)</label><input name="sizes" class="form-control" placeholder="S, M, L, XL" /></div>
    <div class="col-md-6"><label class="form-label">Unavailable Sizes (comma separated)</label><input name="unavailableSizes" class="form-control" placeholder="XXL" /></div>
    <div class="col-md-6"><label class="form-label">Primary Image</label><input name="primaryImage" class="form-control" value="images/jerseys/argentina-home-1.jpg" /></div>
    <div class="col-md-6"><label class="form-label">Secondary Image</label><input name="secondaryImage" class="form-control" value="images/jerseys/argentina-home-2.jpg" /></div>
    <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
    <div class="col-12 d-flex flex-wrap gap-3">
      <div class="form-check"><input name="isPromotion" class="form-check-input" type="checkbox" /><label class="form-check-label">Promotion</label></div>
      <div class="form-check"><input name="isSpecial" class="form-check-input" type="checkbox" /><label class="form-check-label">Special</label></div>
      <div class="form-check"><input name="isGoalkeeperJersey" class="form-check-input" type="checkbox" /><label class="form-check-label">Goalkeeper</label></div>
      <div class="form-check"><input name="isSigned" class="form-check-input" type="checkbox" /><label class="form-check-label">Signed</label></div>
    </div>
    <div class="col-12 mt-3"><button type="submit" class="btn btn-primary">Create Jersey</button><a href="read.html" class="btn btn-outline-light ms-2">Back to Read</a></div>
  </form>
</div>
